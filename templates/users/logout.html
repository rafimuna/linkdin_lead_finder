{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Logged Out</h3>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle text-success" style="font-size: 48px;"></i>
                    <h4 class="mt-3">You have been successfully logged out!</h4>
                    <p class="text-muted">Thank you for using LinkedIn Lead Finder.</p>
                    <hr>
                    <a href="{% url 'login' %}" class="btn btn-primary">Login Again</a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary ml-2">Go to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
